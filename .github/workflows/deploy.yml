name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_API_KEY: AIzaSyCoe4zQ0HKezes6EsolNJxBQ21ndBGYc2A
          VITE_GEMINI_API_KEY: AIzaSyCoe4zQ0HKezes6EsolNJxBQ21ndBGYc2A
          VITE_FIREBASE_API_KEY: AIzaSyCoe4zQ0HKezes6EsolNJxBQ21ndBGYc2A
          VITE_FIREBASE_AUTH_DOMAIN: code-co-writter.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: code-co-writter
          VITE_FIREBASE_STORAGE_BUCKET: code-co-writter.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "718562308268"
          VITE_FIREBASE_APP_ID: "1:718562308268:web:69a5cbfea57e5a30c82f09"
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
