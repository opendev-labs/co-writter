services:
  co-writter:
    build:
      context: .
      args:
        # Connect to the host's NanoPi (Ollama) instance
        - VITE_NANOPI_BASE_URL=http://host.docker.internal:11434
    ports:
      - "8081:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
